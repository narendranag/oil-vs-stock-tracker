<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oil vs Stock Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --muted: #71717a;
      --oil: #f59e0b;
      --stock: #3b82f6;
      --accent: #22c55e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      padding: 24px 32px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .header .oil-icon {
      font-size: 1.6rem;
    }

    .controls {
      padding: 20px 32px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: end;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .control-group label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      font-weight: 500;
    }

    .control-group input, .control-group select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 14px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .control-group input:focus, .control-group select:focus {
      border-color: var(--stock);
    }

    .control-group input::placeholder {
      color: var(--muted);
    }

    .ticker-input {
      width: 120px;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .range-pills {
      display: flex;
      gap: 4px;
      align-self: end;
    }

    .range-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      padding: 10px 16px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .range-pill:hover {
      border-color: var(--stock);
      color: var(--text);
    }

    .range-pill.active {
      background: var(--stock);
      border-color: var(--stock);
      color: #fff;
    }

    .btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      align-self: end;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .chart-container {
      padding: 0 32px 32px;
      position: relative;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      position: relative;
    }

    .chart-wrapper {
      position: relative;
      height: 500px;
    }

    .stats-row {
      display: flex;
      gap: 16px;
      padding: 0 32px 24px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      flex: 1;
      min-width: 160px;
    }

    .stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .stat-sub {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .positive { color: #22c55e; }
    .negative { color: #ef4444; }

    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(15, 17, 23, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      z-index: 10;
      display: none;
    }

    .loading-overlay.visible { display: flex; }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--stock);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: #ef4444;
      font-size: 0.85rem;
      padding: 0 32px;
      min-height: 20px;
    }

    .mode-toggle {
      display: flex;
      gap: 4px;
      align-self: end;
    }

    .mode-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      padding: 10px 14px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-btn:hover {
      border-color: var(--stock);
      color: var(--text);
    }

    .mode-btn.active {
      background: var(--surface);
      border-color: var(--stock);
      color: var(--text);
    }

    .legend-row {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .oil-benchmark-label {
      font-size: 0.75rem;
      color: var(--muted);
      align-self: end;
      padding-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="oil-icon">🛢️</span>
    <h1>Oil vs Stock</h1>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>Stock Ticker</label>
      <input type="text" class="ticker-input" id="tickerInput" placeholder="AAPL" value="AAPL" />
    </div>

    <div class="control-group">
      <label>Oil Benchmark</label>
      <select id="oilBenchmark">
        <option value="CL=F">WTI Crude (CL=F)</option>
        <option value="BZ=F">Brent Crude (BZ=F)</option>
      </select>
    </div>

    <div class="control-group">
      <label>Period</label>
      <div class="range-pills">
        <button class="range-pill" data-range="1mo">1M</button>
        <button class="range-pill" data-range="3mo">3M</button>
        <button class="range-pill active" data-range="6mo">6M</button>
        <button class="range-pill" data-range="1y">1Y</button>
        <button class="range-pill" data-range="2y">2Y</button>
        <button class="range-pill" data-range="5y">5Y</button>
      </div>
    </div>

    <div class="control-group">
      <label>View</label>
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="percent">% Change</button>
        <button class="mode-btn" data-mode="absolute">Absolute</button>
      </div>
    </div>

    <button class="btn" id="loadBtn">Load</button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="stats-row" id="statsRow">
    <div class="stat-card">
      <div class="stat-label" id="oilLabel">WTI Crude Oil</div>
      <div class="stat-value" id="oilPrice">—</div>
      <div class="stat-sub" id="oilChange"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label" id="stockLabel">AAPL</div>
      <div class="stat-value" id="stockPrice">—</div>
      <div class="stat-sub" id="stockChange"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Correlation</div>
      <div class="stat-value" id="correlation">—</div>
      <div class="stat-sub" id="corrDesc"></div>
    </div>
  </div>

  <div class="chart-container">
    <div class="chart-card">
      <div class="legend-row">
        <div class="legend-item">
          <div class="legend-dot" style="background: var(--oil)"></div>
          <span id="legendOil">WTI Crude Oil</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background: var(--stock)"></div>
          <span id="legendStock">AAPL</span>
        </div>
      </div>
      <div class="chart-wrapper">
        <canvas id="mainChart"></canvas>
      </div>
      <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <script>
    // No CORS proxies needed — our Python server proxies Yahoo Finance.

    let chart = null;
    let currentMode = 'percent';
    let currentRange = '6mo';

    // Elements
    const tickerInput = document.getElementById('tickerInput');
    const oilBenchmark = document.getElementById('oilBenchmark');
    const loadBtn = document.getElementById('loadBtn');
    const errorMsg = document.getElementById('errorMsg');
    const loading = document.getElementById('loading');

    // Range pills
    document.querySelectorAll('.range-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelector('.range-pill.active').classList.remove('active');
        pill.classList.add('active');
        currentRange = pill.dataset.range;
        loadData();
      });
    });

    // Mode toggle
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelector('.mode-btn.active').classList.remove('active');
        btn.classList.add('active');
        currentMode = btn.dataset.mode;
        if (chart) updateChart();
      });
    });

    // Load button & Enter key
    loadBtn.addEventListener('click', loadData);
    tickerInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loadData();
    });

    async function fetchYahoo(symbol, range) {
      const interval = ['1mo', '3mo'].includes(range) ? '1d' : '1wk';
      const url = `/api/chart/${encodeURIComponent(symbol)}?range=${range}&interval=${interval}&includePrePost=false`;

      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`Could not fetch data for ${symbol} (HTTP ${resp.status})`);
      const data = await resp.json();
      const result = data.chart?.result?.[0];
      if (!result) throw new Error(`No data returned for ${symbol}`);

      const timestamps = result.timestamp;
      const closes = result.indicators.quote[0].close;
      const meta = result.meta;

      const points = [];
      for (let i = 0; i < timestamps.length; i++) {
        if (closes[i] != null) {
          points.push({
            date: new Date(timestamps[i] * 1000),
            close: closes[i]
          });
        }
      }
      return { points, currency: meta.currency, name: meta.shortName || symbol };
    }

    function alignDates(oilData, stockData) {
      const stockMap = new Map();
      stockData.forEach(p => stockMap.set(p.date.toISOString().slice(0, 10), p.close));

      const oilMap = new Map();
      oilData.forEach(p => oilMap.set(p.date.toISOString().slice(0, 10), p.close));

      const allDates = [...new Set([
        ...oilData.map(p => p.date.toISOString().slice(0, 10)),
        ...stockData.map(p => p.date.toISOString().slice(0, 10))
      ])].sort();

      const aligned = { dates: [], oil: [], stock: [] };
      for (const d of allDates) {
        if (oilMap.has(d) && stockMap.has(d)) {
          aligned.dates.push(new Date(d));
          aligned.oil.push(oilMap.get(d));
          aligned.stock.push(stockMap.get(d));
        }
      }
      return aligned;
    }

    function pearsonCorrelation(x, y) {
      const n = x.length;
      if (n < 2) return 0;
      const meanX = x.reduce((a, b) => a + b, 0) / n;
      const meanY = y.reduce((a, b) => a + b, 0) / n;
      let num = 0, denX = 0, denY = 0;
      for (let i = 0; i < n; i++) {
        const dx = x[i] - meanX;
        const dy = y[i] - meanY;
        num += dx * dy;
        denX += dx * dx;
        denY += dy * dy;
      }
      const den = Math.sqrt(denX * denY);
      return den === 0 ? 0 : num / den;
    }

    let oilRaw = [], stockRaw = [], alignedData = null, oilName = '', stockName = '';

    async function loadData() {
      const ticker = tickerInput.value.trim().toUpperCase();
      if (!ticker) {
        errorMsg.textContent = 'Please enter a stock ticker.';
        return;
      }
      tickerInput.value = ticker;
      errorMsg.textContent = '';
      loading.classList.add('visible');
      loadBtn.disabled = true;

      try {
        const oilSymbol = oilBenchmark.value;
        const [oilResult, stockResult] = await Promise.all([
          fetchYahoo(oilSymbol, currentRange),
          fetchYahoo(ticker, currentRange)
        ]);

        oilRaw = oilResult.points;
        stockRaw = stockResult.points;
        oilName = oilBenchmark.options[oilBenchmark.selectedIndex].text.split('(')[0].trim();
        stockName = ticker;

        alignedData = alignDates(oilRaw, stockRaw);

        if (alignedData.dates.length < 2) {
          throw new Error('Not enough overlapping data points. Try a different ticker or range.');
        }

        updateStats();
        updateChart();

        // Update labels
        document.getElementById('oilLabel').textContent = oilName;
        document.getElementById('stockLabel').textContent = stockName;
        document.getElementById('legendOil').textContent = oilName;
        document.getElementById('legendStock').textContent = stockName;

      } catch (e) {
        errorMsg.textContent = e.message;
      } finally {
        loading.classList.remove('visible');
        loadBtn.disabled = false;
      }
    }

    function updateStats() {
      if (!alignedData || alignedData.dates.length < 2) return;
      const { oil, stock } = alignedData;

      const oilStart = oil[0], oilEnd = oil[oil.length - 1];
      const stockStart = stock[0], stockEnd = stock[stock.length - 1];

      const oilPctChange = ((oilEnd - oilStart) / oilStart) * 100;
      const stockPctChange = ((stockEnd - stockStart) / stockStart) * 100;

      document.getElementById('oilPrice').textContent = `$${oilEnd.toFixed(2)}`;
      const oilChangeEl = document.getElementById('oilChange');
      oilChangeEl.textContent = `${oilPctChange >= 0 ? '+' : ''}${oilPctChange.toFixed(2)}%`;
      oilChangeEl.className = `stat-sub ${oilPctChange >= 0 ? 'positive' : 'negative'}`;

      document.getElementById('stockPrice').textContent = `$${stockEnd.toFixed(2)}`;
      const stockChangeEl = document.getElementById('stockChange');
      stockChangeEl.textContent = `${stockPctChange >= 0 ? '+' : ''}${stockPctChange.toFixed(2)}%`;
      stockChangeEl.className = `stat-sub ${stockPctChange >= 0 ? 'positive' : 'negative'}`;

      // Returns for correlation
      const oilReturns = [], stockReturns = [];
      for (let i = 1; i < oil.length; i++) {
        oilReturns.push((oil[i] - oil[i-1]) / oil[i-1]);
        stockReturns.push((stock[i] - stock[i-1]) / stock[i-1]);
      }

      const corr = pearsonCorrelation(oilReturns, stockReturns);
      document.getElementById('correlation').textContent = corr.toFixed(3);
      const corrEl = document.getElementById('corrDesc');
      const absCorr = Math.abs(corr);
      let desc = absCorr > 0.7 ? 'Strong' : absCorr > 0.4 ? 'Moderate' : absCorr > 0.2 ? 'Weak' : 'Very weak';
      desc += corr < 0 ? ' negative' : ' positive';
      corrEl.textContent = desc;
    }

    function updateChart() {
      if (!alignedData) return;
      const { dates, oil, stock } = alignedData;

      let oilValues, stockValues, yLabel;

      if (currentMode === 'percent') {
        const oilBase = oil[0];
        const stockBase = stock[0];
        oilValues = oil.map(v => ((v - oilBase) / oilBase) * 100);
        stockValues = stock.map(v => ((v - stockBase) / stockBase) * 100);
        yLabel = '% Change from Start';
      } else {
        oilValues = [...oil];
        stockValues = [...stock];
        yLabel = '';
      }

      const oilDataset = {
        label: oilName,
        data: dates.map((d, i) => ({ x: d, y: oilValues[i] })),
        borderColor: '#f59e0b',
        backgroundColor: 'rgba(245, 158, 11, 0.08)',
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 5,
        tension: 0.3,
        fill: false,
        yAxisID: currentMode === 'absolute' ? 'yOil' : 'y',
      };

      const stockDataset = {
        label: stockName,
        data: dates.map((d, i) => ({ x: d, y: stockValues[i] })),
        borderColor: '#3b82f6',
        backgroundColor: 'rgba(59, 130, 246, 0.08)',
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 5,
        tension: 0.3,
        fill: false,
        yAxisID: currentMode === 'absolute' ? 'yStock' : 'y',
      };

      const scales = {
        x: {
          type: 'time',
          time: { tooltipFormat: 'MMM d, yyyy' },
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#71717a', maxTicksLimit: 12 },
        }
      };

      if (currentMode === 'percent') {
        scales.y = {
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: {
            color: '#71717a',
            callback: (v) => `${v >= 0 ? '+' : ''}${v.toFixed(1)}%`
          },
          title: { display: true, text: yLabel, color: '#71717a' }
        };
      } else {
        scales.yOil = {
          type: 'linear',
          position: 'left',
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: {
            color: '#f59e0b',
            callback: (v) => `$${v.toFixed(0)}`
          },
          title: { display: true, text: oilName + ' ($)', color: '#f59e0b' }
        };
        scales.yStock = {
          type: 'linear',
          position: 'right',
          grid: { drawOnChartArea: false },
          ticks: {
            color: '#3b82f6',
            callback: (v) => `$${v.toFixed(0)}`
          },
          title: { display: true, text: stockName + ' ($)', color: '#3b82f6' }
        };
      }

      if (chart) chart.destroy();

      chart = new Chart(document.getElementById('mainChart'), {
        type: 'line',
        data: { datasets: [oilDataset, stockDataset] },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1a1d27',
              borderColor: '#2a2d3a',
              borderWidth: 1,
              titleColor: '#e4e4e7',
              bodyColor: '#e4e4e7',
              padding: 12,
              callbacks: {
                label: function(ctx) {
                  const val = ctx.parsed.y;
                  if (currentMode === 'percent') {
                    return `${ctx.dataset.label}: ${val >= 0 ? '+' : ''}${val.toFixed(2)}%`;
                  }
                  return `${ctx.dataset.label}: $${val.toFixed(2)}`;
                }
              }
            }
          },
          scales
        }
      });
    }

    // Load initial data
    loadData();
  </script>
</body>
</html>
